kind = "web"
previewPath = "/"
title = "Dbrutals - Route & Calendar Management"
version = "1.0.0"
id = "artifacts/dbrutals"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20711

[services.development]
run = "pnpm --filter @workspace/dbrutals run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dbrutals", "run", "build" ]
publicDir = "artifacts/dbrutals/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20711"
BASE_PATH = "/"
