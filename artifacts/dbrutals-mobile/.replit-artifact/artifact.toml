kind = "mobile"
previewPath = "/mobile/"
title = "Dbrutals Mobile"
version = "1.0.0"
id = "artifacts/dbrutals-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 18814

[services.development]
run = "pnpm --filter @workspace/dbrutals-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dbrutals-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/dbrutals-mobile", "run", "serve" ]

[services.env]
PORT = "18814"
BASE_PATH = "/mobile/"
